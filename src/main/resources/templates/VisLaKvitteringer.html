<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Oversigt over lejeaftaler kvitteringer</title>
</head>
<body>

<!--estera -->
<h1>Se alle kvitteringer</h1>
<a th:href="@{'getAll'}" > Vis alle lejeaftaler kvitteringer</a>

<table>
    <tr>
        <th>id</th>
        <th>skadeMatrixId</th>
        <th>startDate</th>
        <th>slutDate</th>
        <th>totalPrisKr</th>
        <th>type</th>
    </tr>

    <tr th:each="kv:${laKvitteringer}">
        <td th:text="${kv.id}"></td>
        <td th:text="${kv.skadeMatrixId}"></td>
        <td th:text="${kv.startDate}"></td>
        <td th:text="${kv.slutDate}"></td>
        <td th:text="${kv.totalPrisKr}"></td>
        <td th:text="${kv.type}"></td>

    </tr>

</table>

<h1>Se kvittering ByID</h1>
<a th:href="@{'getById'}" > Vis lejeaftale kvittering ById</a>

<table th:if="${laKvittering!=null}">
    <tr>
        <th>id</th>
        <th>skadeMatrixId</th>
        <th>startDate</th>
        <th>slutDate</th>
        <th>totalPrisKr</th>
        <th>type</th>
    </tr>

    <tr>
        <td th:text="${laKvittering.id}"></td>
        <td th:text="${laKvittering.skadeMatrixId}"></td>
        <td th:text="${laKvittering.startDate}"></td>
        <td th:text="${laKvittering.slutDate}"></td>
        <td th:text="${laKvittering.totalPrisKr}"></td>
        <td th:text="${laKvittering.type}"></td>

    </tr>
</table>

</body>
</html>
