<!DOCTYPE html>

<head>

    <title>Oversigtspage</title>
</head>
<body>

</header>
<main>
    <div>
        <div th:each="bil : ${bilList}" th:if="${oversigtPageType == 'oversigtBil'}">

                <h3 th:text="${bil.bilmodel.maerke} +' - '+${ bil.bilmodel.model}"></h3>
                <form th:action="@{/updateStatusBil}" method="post">
                    <input name="id" th:value="${bil.getId()}" hidden>
                    <input name="updateStatus" value="klar" th:if="${bil.getStatusBil()=='nyBil'}" hidden>
                    <button type="submit">Update</button>
                </form>
                <form>

                </form>
            </div>
        </div>
    </div>
