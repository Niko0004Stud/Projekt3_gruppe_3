<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Brugerside</title>
</head>
<body>
<main>  <!-- Opret struktur her lavet af Nicklas -->
  <div> <!--Alle opretninger tilføjes her. Husk at definere hvilke roller der må se dem -->
      <form th:action="@{/getCreatePage}" method="get">
          <label for="opret">Opretninger</label>
          <select name="opretPageType" id="opret" onchange="this.form.submit()">
              <option hidden>Vælg opretning</option>
              <option value="createUser" th:if="${user.getSysRole() == 'admin'}"  >Opret Bruger</option>
              <option value="createBil" th:if="${user.getSysRole() == 'admin' or user.getSysRole() ==  'dataregistrerer'}" >Opret Bil</option>
              <option value="createLejeaftale" th:if="${user.getSysRole() == 'admin' or user.getSysRole() == 'dataregistrerer'}" >Opret Lejeaftale</option>
              <option value="createForhaandsaftale" th:if="${user.getSysRole() == 'admin' or user.getSysRole() == 'dataregistrerer'}" >Opret Forhåndsaftale</option>
              <option value="createSkade" th:if="${user.getSysRole() == 'admin' or user.getSysRole() == 'biltech'}" >Opret Skade</option>
              <option value="createSkadeMatrix" th:if="${user.getSysRole() == 'admin' or user.getSysRole() == 'biltech'}" >Opret SkadeMatrix</option>
              <option th:if="${user.getSysRole() == 'admin'}"></option>
          </select>
      </form>
  </div>
  <div>
      <label for="oversigt">Oversigter</label>
      <div  id="oversigt">
          <form th:action="@{/getOversigtBil}" th:if="${user.getSysRole() == 'admin' or user.getSysRole() == 'biltech'
           or user.getSysRole() == 'dataregistrerer'}" method="get">
              <input value="oversigtBil" name="oversigtPageType"  hidden>
              <button type="submit" >Biloversigt</button>
          </form>
      </div>
  </div>
    <section>
        <!-- dashboard struktur lavet af sebastian-->
        <h2>Dashboard</h2>

        <div th:if="${user.sysRole == 'admin'}">

            <h3>Biler</h3>
            <div th:each="bil : ${biler}">
                <p th:text="${bil.bilmodel.maerke + ' - ' + bil.bilmodel.model}"></p>
            </div>
            <h4>Users</h4>
            <div th:each="u : ${users}">
                <p th:text="${u.username + ' - ' + u.password}"></p>
            </div>
        </div>
        <div th:if="${user.sysRole == 'dataregistrerer'}">
<!--            //skal melde tilbagevendt-->

            <h3>Biler</h3>
            <div class="dashboard-buttons">
                <a class="dashboard-btn" th:href="@{/getOversigtBil(oversigtPageType='oversigtBil')}">
                    Alle biler
                </a>

            </div>
            <div th:each="bil : ${bilerStatus}">
                <a th:href="@{/getOversigtBil(oversigtPageType='oversigtBil')}">
                <p th:text="${bil.statusBil + ' - ' + bil.bilmodel.maerke
                + ' - ' + bil.bilmodel.model + ' - ' + bil.vognnummer}"></p>
                </a>
            </div>
        </div>
        <div th:if="${user.sysRole == 'biltech'}">
            <h4>Biler som skal tilses</h4>

            <div th:each="bil :${bilerStatus}">
                <a th:href="@{/getOversigtBil(oversigtPageType='oversigtBil')}">
                    <p th:text="${bil.statusBil + ' - ' + bil.bilmodel.maerke + ' - ' +
                bil.bilmodel.model}"></p>
                </a>

            </div>
        </div>
    </section>

    <!-- logout lavet af Natasha-->
    <form th:action="@{/tryLogout}" method="get">
        <button type="submit">Log ud</button>
    </form>
</main>
</body>
</html>
