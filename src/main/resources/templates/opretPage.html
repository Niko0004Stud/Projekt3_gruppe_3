<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Opretningspage</title>
</head>
<body>
<main>
    <div>
        <form th:action="@{/opretUser}" th:if="${opretPageType == 'createUser'}" method="post">
            <label for="usernameField">Username:</label>
            <input name="username" id="usernameField" type="text"  required>
            <label for="passwordField">Password:</label>
            <input name="password" id="passwordField" type="text" >
            <label for="sysRoleDropdown">Systemrolle</label>
            <ul id="sysRoleDropdown">
                <li>
                    <label for="adminRadio">Admin:</label>
                    <input name="sysRole" value="admin" id="adminRadio" type="radio">
                    <label for="drRadio">Dataregistrerer:</label>
                    <input name="sysRole" value="dataregistrerer" id="drRadio" type="radio">
                    <label for="suRadio">Skade Og Udbedring:</label>
                    <input name="sysRole" value="skadeOgUdbedring" id="suRadio" type="radio">
                    <label for="fuRadio">Forretningsudvikler:</label>
                    <input name="sysRole" value="forretningsudvikling" id="fuRadio" type="radio">
                </li>
            </ul>
            <button type="submit">Opret</button>
        </form>
        <form th:action="@{/opretForhaandsaftaler}"  th:if="${opretPageType =='createForhaandsaftale'}" method="post">
            <label for="bilIdField">Bil Id:</label>
            <input name="Bil Id" id="bilIdField" type="text"  required>

            <label for="KundeIdField"> Kunde Id:</label>
            <input name="Kunde Id" id="KundeIdField" type="text" required>

            <label for="fhaKvitteringIdField"> ForhåndsKvittering:</label>
            <input name="fhaKvitteringId" id="fhaKvitteringIdField" type="text" required>

            <label for="StartPrisKrField"> Start Pris :</label>
            <input name="StartPrisKr" id="StartPrisKrField" type="number" required>

            <label for="RegDateField">  RegDate:</label>
            <input name="RegDate" id="RegDateField" type="date" required>
        </form>
    </div>
</main>
</body>
</html>
