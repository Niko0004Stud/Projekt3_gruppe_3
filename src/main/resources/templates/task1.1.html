<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lejeaftaler</title>
</head>
<body>
<header class="Lejeaftaler">
    <h1>Lejeaftaler</h1>
</header>

<main>
    <form th:action="@{/lejeaftale/create}" method="post">
        <label> Bil Id:</label>
        <input type="number" name="bilId">

        <label> Kunde Id:</label>
        <input type="number" name="kundeID">

        <label> Startsdato:</label>
        <input type="date" name="kundeId">

        <label> Leangde days:</label>
        <input type="number" name="laengdeDays">

        <label>Pris kr:</label>
        <input type="number" name="prisKr">

        <label> Skadematrix Id:</label>
        <input type="number" name="skadematrixId">

        <button type="submit">Opret ny lejeaftale</button>
    </form>

</main>

</body>
</html>
